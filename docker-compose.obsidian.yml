version: '3.8'

services:
  obsidian:
    container_name: obsidian
    image: lscr.io/linuxserver/obsidian:latest
    environment:
        - PUID=1000
        - PGID=1000
    ports:
        - 3000:3000
        - 3001:3001
    volumes:
        - /srv/docker/obsidian:/config
    shm_size: 1gb
    restart: unless-stopped
    networks:
      - coiso
      - development-server

networks:
  coiso:
    name: coiso
    external: true
  development-server:
    name: development-server
    external: true
