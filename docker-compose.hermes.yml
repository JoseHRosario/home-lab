version: '3.8'

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    #user: "1000:1000"
    env_file:
      - /srv/docker/env/hermes.env
    ports:
      - "8642:8642"  
    volumes:
      - /srv/docker/hermes:/opt/data
      - "/srv/docker/obsidian/Obsidian Vault:/vault"
    command: gateway run
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    networks:
      - coiso
      - development-server

  hermes-dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host hermes.kerumirembora.com
    ports:
      - "9119:9119"
    volumes:
      - /srv/docker/hermes:/opt/data
    environment:
      - GATEWAY_HEALTH_URL=http://hermes:8642
    depends_on:
      - hermes
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"  
    networks:
      - coiso
      - development-server
    

networks:
  coiso:
    name: coiso
    external: true
  development-server:
    name: development-server
    external: true