version: '3.8'

services:
  maestro-api:
    image: gitlabcr.kerumirembora.com/xungamancorp/maestro/api:qa-latest
    container_name: maestro-api
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "5432:5432"
    env_file:
      - /srv/docker/env/postgres-dev.env
    networks:
      - development-server
      
  maestro-webapp:
    image: gitlabcr.kerumirembora.com/xungamancorp/maestro/webapp:qa-latest
    container_name: maestro-webapp
    restart: unless-stopped
    ports:
      - 5050:80
    env_file:
      - /srv/docker/env/postgres-dev.env
    volumes:  
      - /srv/docker/pgadmin:/var/lib/pgadmin
    networks:
      - development-server

